<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>π — Ways to Calculate Pi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Mobile top bar (hidden on desktop) -->
      <div id="mobile-topbar">
        <button id="hamburger" aria-label="Open navigation" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
        <span class="mobile-title"><span class="mobile-pi">π</span> Searching for Pi</span>
      </div>

      <!-- Overlay backdrop for mobile nav drawer -->
      <div id="nav-overlay" aria-hidden="true"></div>

      <!-- Sidebar navigation -->
      <nav id="sidebar" aria-label="Methods">
        <div class="sidebar-header">
          <span class="pi-symbol">π</span>
          <div class="sidebar-title">
            <h1>Ways to Calculate Pi</h1>
            <p>An interactive exploration</p>
          </div>
        </div>

        <ul class="nav-list" id="nav-list">
          <!-- Navigation links generated dynamically from pages.ts -->
        </ul>

        <div class="theme-switcher">
          <button id="theme-toggle" class="btn" type="button" aria-label="Toggle dark mode">
            🌙 Dark Mode
          </button>
        </div>

        <div class="sidebar-footer">
          <span class="true-pi">π ≈ 3.14159265358979…</span>
        </div>
      </nav>

      <!-- Main content area -->
      <main id="main-content">
        <div id="page-container"></div>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
